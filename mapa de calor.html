<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analise Racial Pro - Negram</title>
    <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyChRBvY3f-O5wID0-wYm2SyT3qkTuWWP8Jg&s" type="image/x-icon">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-color: #cfb7b1;
            --primary: #6b1c14;
            --secondary: #ac8563;
            --accent: #efb954;
            --danger: #d89667;
            --text-main: #333333;
            --card-bg: #ffffff;
            --st-red: #ff4b4b;
            --st-gray: #f0f2f6;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* MARCA D'ÁGUA */
        .negram-watermark {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9998; opacity: 0.06;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='250' height='250'><text x='50%' y='50%' font-size='26' font-family='Arial' font-weight='900' fill='%23000' text-anchor='middle' alignment-baseline='middle' transform='rotate(-45 125 125)'>NEGRAM</text></svg>");
            background-repeat: repeat; user-select: none; display: none;
        }

        /* LOGIN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-card {
            background: var(--card-bg); padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center;
        }
        .login-card img { width: 80px; margin-bottom: 15px; border-radius: 50%; border: 3px solid var(--accent); }
        .login-card h2 { margin-bottom: 20px; color: var(--primary); }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: var(--primary); }
        .input-group input { width: 100%; padding: 10px; border: 1px solid var(--secondary); border-radius: 8px; font-size: 16px; outline: none; }
        .login-btn { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }

        /* DASHBOARD */
        #dashboard { display: none; height: 100vh; display: flex; }
        .sidebar { width: 320px; background: #f8f9fb; padding: 20px; overflow-y: auto; height: 100vh; border-right: 1px solid #e6e6e6; }
        
        details.st-expander { background: white; border: 1px solid #e6e6e6; border-radius: 8px; margin-bottom: 15px; position: relative; }
        details.st-expander summary { padding: 12px 15px; font-weight: 500; font-size: 14px; cursor: pointer; color: #31333F; display: block; list-style: none; }
        details.st-expander summary::before { content: '›'; font-size: 20px; margin-right: 10px; display: inline-block; transition: transform 0.2s; vertical-align: middle; }
        details.st-expander[open] summary::before { transform: rotate(90deg); }
        .expander-content { padding: 15px; border-top: 1px solid #e6e6e6; }

        /* MULTISELECT */
        .ms-container { position: relative; width: 100%; }
        .ms-box { min-height: 38px; border: 1px solid #ccc; border-radius: 5px; background: white; padding: 4px 30px 4px 8px; cursor: text; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; position: relative; }
        .ms-chip { background-color: var(--st-red); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; display: inline-flex; align-items: center; gap: 5px; }
        .ms-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border: 1px solid #ccc; border-radius: 5px; z-index: 9999; display: none; max-height: 200px; flex-direction: column; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .ms-option { padding: 8px 12px; font-size: 13px; cursor: pointer; }
        .ms-option:hover { background: var(--st-gray); }

        /* INTERFACE PRINCIPAL */
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; position: relative; }
        .header { margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .metrics-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .metric-card { background: white; flex: 1; padding: 20px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--secondary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .content-grid { display: flex; gap: 20px; flex: 1; min-height: 500px; }
        #map { flex: 3; border-radius: 10px; border: 1px solid #eee; z-index: 1; }
        .ranking { flex: 1; background: white; padding: 20px; border-radius: 10px; border-top: 4px solid var(--primary); overflow-y: auto; }
    </style>
</head>
<body>

    <div class="negram-watermark" id="wm"></div>

    <div id="login-screen">
        <div class="login-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyChRBvY3f-O5wID0-wYm2SyT3qkTuWWP8Jg&s" alt="Logo Negram">
            <h2>Analise Racial Pro</h2>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" value="negram.ippur.ufrj@gmail.com">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" value="negram_ufrj@">
            </div>
            <button class="login-btn" onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <h3 style="color: #31333F; margin-bottom: 20px; border-bottom: 2px solid #e6e6e6; padding-bottom: 10px;">⚙️ Filtros do Mapa</h3>
            
            <div style="margin-bottom: 20px;">
                <label style="font-size: 12px; font-weight: bold; color: #31333F;">📁 Upload GeoJSON</label>
                <input type="file" id="upload-geojson" accept=".geojson,.json" style="width:100%; font-size:12px; margin-top:5px;">
            </div>

            <details class="st-expander" open>
                <summary>🌍 Estilo Visual</summary>
                <div class="expander-content">
                    <select id="map-style" onchange="mudarFundoMapa()" style="width:100%; padding:5px;">
                        <option value="cartodbpositron">Mapa Claro</option>
                        <option value="cartodbdark_matter">Mapa Escuro</option>
                        <option value="satellite">Satélite</option>
                    </select>
                </div>
            </details>

            <details class="st-expander" open>
                <summary>📍 Localização</summary>
                <div class="expander-content">
                    <div class="ms-container" id="ms-container">
                        <div class="ms-box" id="ms-box" onclick="toggleDropdown()">
                            <div id="ms-chips-area"><span style="color:#999; font-size:13px;">Todos</span></div>
                        </div>
                        <div class="ms-dropdown" id="ms-dropdown">
                            <input type="text" id="ms-search" placeholder="Filtrar..." onkeyup="filterOptions()" style="width:100%; padding:8px; border:none; border-bottom:1px solid #eee;">
                            <div id="ms-options-list" style="overflow-y:auto;"></div>
                        </div>
                    </div>
                </div>
            </details>
            
            <details class="st-expander" open>
                <summary>📊 Camada Racial</summary>
                <div class="expander-content">
                    <select id="filtro-camada" onchange="atualizarDashboard()" style="width:100%; padding:5px;">
                        <option value="brancas_5">Brancas: 5 Classes</option>
                        <option value="negras_5">Negras: 5 Classes</option>
                        <option value="limite_50">50% Negras/Brancos</option>
                    </select>
                </div>
            </details>

            <div id="legenda-container" style="background:white; padding:10px; border-radius:8px; border:1px solid #eee; font-size:12px;"></div>
            <button onclick="location.reload()" style="width:100%; margin-top:20px; padding:10px; cursor:pointer; background:none; border:1px solid #ccc; border-radius:8px; color:#666;">Sair</button>
        </div>

        <div class="main-content">
            <div class="header">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyChRBvY3f-O5wID0-wYm2SyT3qkTuWWP8Jg&s" alt="Logo">
                <h2 style="color:var(--primary)">Painel de Análise - Emerson</h2>
                <h3 id="titulo-cidade" style="margin-left:auto; font-weight:normal; color:var(--secondary)">Aguardando dados...</h3>
            </div>

            <div class="metrics-container">
                <div class="metric-card"><h4>Média Brancos</h4><div class="value" id="media-brancos">--%</div></div>
                <div class="metric-card"><h4>Média Negras</h4><div class="value" id="media-negras" style="color:var(--primary)">--%</div></div>
            </div>

            <div class="content-grid">
                <div id="map"></div>
                <div class="ranking">
                    <h3 style="color:var(--primary); font-size:16px; margin-bottom:15px;">🏆 Top Concentrações</h3>
                    <div id="ranking-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const CORES_NEGRAS_5 = ['#ffffc1', '#fee08f', '#fda15f', '#f3624d', '#ca3351'];
        const CORES_BRANCAS_5 = ['#ffffd6', '#d2edc3', '#67c5d0', '#5699c6', '#515da9'];
        const COR_BRANCOS = '#1f3480';
        const COR_NEGROS = '#9d2417';

        let mapaPrincipal, camadaBase, camadaGeoJSON = null, dadosGlobais = null;
        let camadaSedes = null; // Camada das Prefeituras
        let municipiosAtuais = [], selecoesMultiselect = [];

        // ÍCONE PERSONALIZADO DA PREFEITURA
        const iconePrefeitura = L.icon({
            iconUrl: 'https://cdn-icons-png.freepik.com/256/15640/15640731.png',
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });

        function fazerLogin() {
            if (document.getElementById('email').value === "negram.ippur.ufrj@gmail.com" && document.getElementById('password').value === "negram_ufrj@") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                document.getElementById('wm').style.display = 'block';
                setTimeout(() => {
                    inicializarMapa();
                    carregarSedesPrefeituras(); // Carrega automaticamente o arquivo das prefeituras
                }, 200);
            }
        }

        function inicializarMapa() {
            mapaPrincipal = L.map('map').setView([-22.9068, -43.1729], 9);
            camadaBase = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(mapaPrincipal);
        }

        // FUNÇÃO PARA CARREGAR AS SEDES MUNICIPAIS DO GITHUB/PASTA LOCAL
        function carregarSedesPrefeituras() {
            fetch('sedes_municipais_rj.json')
                .then(response => response.json())
                .then(data => {
                    camadaSedes = L.geoJSON(data, {
                        pointToLayer: (feature, latlng) => L.marker(latlng, {icon: iconePrefeitura}),
                        onEachFeature: (feature, layer) => {
                            layer.bindPopup(`
                                <div style="font-family:sans-serif; line-height:1.4;">
                                    <strong style="color:#6b1c14;">${feature.properties.nome}</strong><br>
                                    <b>Cidade:</b> ${feature.properties.cidade}<br>
                                    <b>Endereço:</b> ${feature.properties.endereco}<br>
                                    <b>CEP:</b> ${feature.properties.cep}
                                </div>
                            `);
                        }
                    }).addTo(mapaPrincipal);
                    
                    // Adiciona controle de camada para o usuário poder ligar/desligar as prefeituras
                    L.control.layers(null, {"Sedes das Prefeituras": camadaSedes}, {position: 'topright'}).addTo(mapaPrincipal);
                })
                .catch(err => console.log("Arquivo sedes_municipais_rj.json não encontrado ou erro na leitura."));
        }

        // LÓGICA DE UPLOAD E DASHBOARD (Resumo das versões anteriores)
        document.getElementById('upload-geojson').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (evt) => {
                dadosGlobais = JSON.parse(evt.target.result);
                const setMun = new Set();
                dadosGlobais.features.forEach(f => { if(f.properties.NM_MUNICIP) setMun.add(f.properties.NM_MUNICIP); });
                municipiosAtuais = Array.from(setMun).sort();
                selecoesMultiselect = [];
                renderizarOpcoesDropdown();
                atualizarDashboard();
            };
            reader.readAsText(e.target.files[0]);
        });

        function atualizarDashboard() {
            if (!dadosGlobais) return;
            const camadaSel = document.getElementById('filtro-camada').value;
            let filtrados = dadosGlobais.features;
            if (selecoesMultiselect.length > 0) filtrados = filtrados.filter(f => selecoesMultiselect.includes(f.properties.NM_MUNICIP));
            
            document.getElementById('titulo-cidade').innerText = selecoesMultiselect.length > 0 ? selecoesMultiselect.join(', ') : "Todos os Municípios";
            plotarMapa(filtrados, camadaSel);
            gerarMetricasERanking(filtrados, camadaSel);
        }

        function plotarMapa(features, camada) {
            if (camadaGeoJSON) mapaPrincipal.removeLayer(camadaGeoJSON);
            camadaGeoJSON = L.geoJSON(features, {
                style: (f) => {
                    let val = camada === 'brancas_5' ? f.properties['BRANCOS%'] : f.properties['NEGROS%'];
                    let cores = camada === 'brancas_5' ? CORES_BRANCAS_5 : CORES_NEGRAS_5;
                    let cor = val <= 20 ? cores[0] : val <= 40 ? cores[1] : val <= 60 ? cores[2] : val <= 80 ? cores[3] : cores[4];
                    return {fillColor: cor, weight: 0.5, opacity: 1, color: 'white', fillOpacity: 0.7};
                },
                onEachFeature: (f, l) => l.bindPopup(`<b>${f.properties.NM_BAIRRO}</b><br>Negras: ${f.properties['NEGROS%']}%`)
            }).addTo(mapaPrincipal);
            mapaPrincipal.fitBounds(camadaGeoJSON.getBounds());
        }

        function gerarMetricasERanking(features, camada) {
            let sB = 0, sN = 0;
            features.forEach(f => { sB += f.properties['BRANCOS%']; sN += f.properties['NEGROS%']; });
            document.getElementById('media-brancos').innerText = (sB/features.length).toFixed(1) + "%";
            document.getElementById('media-negras').innerText = (sN/features.length).toFixed(1) + "%";

            const rankCol = camada === 'brancas_5' ? 'BRANCOS%' : 'NEGROS%';
            let top5 = [...features].sort((a,b) => b.properties[rankCol] - a.properties[rankCol]).slice(0,5);
            let html = '';
            top5.forEach(f => {
                let v = f.properties[rankCol];
                html += `<div style="margin-bottom:10px;"><p style="font-size:12px; font-weight:bold; margin:0;">${f.properties.NM_BAIRRO}</p>
                        <div style="background:#eee; height:8px; border-radius:4px;"><div style="width:${v}%; background:var(--primary); height:100%; border-radius:4px;"></div></div>
                        <span style="font-size:10px; color:#666;">${v}%</span></div>`;
            });
            document.getElementById('ranking-list').innerHTML = html;
        }

        // UTILITÁRIOS MULTISELECT
        function toggleDropdown() { document.getElementById('ms-dropdown').style.display = document.getElementById('ms-dropdown').style.display === 'flex' ? 'none' : 'flex'; }
        function renderizarOpcoesDropdown() {
            let html = `<div class="ms-option" onclick="selecoesMultiselect=[]; atualizarDashboard(); atualizarVisualMultiselect();"><b>Limpar Seleção</b></div>`;
            municipiosAtuais.forEach(m => {
                html += `<div class="ms-option" onclick="toggleMun('${m}')">${m}</div>`;
            });
            document.getElementById('ms-options-list').innerHTML = html;
        }
        function toggleMun(m) {
            if (selecoesMultiselect.includes(m)) selecoesMultiselect = selecoesMultiselect.filter(i => i !== m);
            else selecoesMultiselect.push(m);
            atualizarVisualMultiselect();
            atualizarDashboard();
        }
        function atualizarVisualMultiselect() {
            let area = document.getElementById('ms-chips-area');
            if (selecoesMultiselect.length === 0) area.innerHTML = '<span style="color:#999; font-size:13px;">Todos</span>';
            else area.innerHTML = selecoesMultiselect.map(m => `<div class="ms-chip">${m}</div>`).join('');
        }
        function mudarFundoMapa() {
            let s = document.getElementById('map-style').value;
            let url = s === 'satellite' ? 'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}' : `https://{s}.basemaps.cartocdn.com/${s === 'cartodbpositron'?'light':'dark'}_all/{z}/{x}/{y}{r}.png`;
            camadaBase.setUrl(url);
        }
    </script>
</body>
</html>
